x-openrouter-env: &openrouter-env
  environment:
    OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: tetrad-server:local
    <<: *openrouter-env
    ports:
      - "8080:8080"
    volumes:
      - games:/app/games
    restart: unless-stopped

  client-a:
    build:
      context: .
      dockerfile: Dockerfile.client
    image: tetrad-client:local
    <<: *openrouter-env
    ports:
      - "3001:80"
    depends_on:
      - server
    restart: unless-stopped

  client-b:
    image: tetrad-client:local
    <<: *openrouter-env
    ports:
      - "3002:80"
    depends_on:
      - client-a
    restart: unless-stopped

  client-c:
    build:
      context: .
      dockerfile: Dockerfile.client
    image: tetrad-client:local
    <<: *openrouter-env
    ports:
      - "3003:80"
    depends_on:
      - server
    restart: unless-stopped

  client-d:
    image: tetrad-client:local
    <<: *openrouter-env
    ports:
      - "3004:80"
    depends_on:
      - client-a
    restart: unless-stopped
volumes:
  games:
